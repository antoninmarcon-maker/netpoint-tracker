    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "My Volley",
      "operatingSystem": "Web, Android, iOS",
      "applicationCategory": "SportsApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "description": "My Volley — Application professionnelle de scouting et de statistiques pour le volleyball. Scoring en temps réel, heatmaps de précision, analyse tactique par IA, gestion de tournois et carte communautaire des terrains.",
      "featureList": [
        "Comptage de points en temps réel pour le volleyball",
        "Heatmap des zones d'impact et de fautes",
        "Statistiques individuelles par joueur",
        "Export Excel (XLSX) set par set",
        "Mode Progressif Web App (PWA) pour usage hors-ligne",
        "Analyse tactique assistée par IA contextuelle",
        "Synchronisation multi-appareils Cloud",
        "Gestion des numéros de maillots",
        "Gestion de tournois avec inscription en ligne",
        "Carte communautaire des terrains de volley",
        "Filtres avancés par type de terrain, équipement et catégorie",
        "Actions personnalisables et faits de jeu neutres"
      ]
    }
    </script>
    <!-- Prevent theme flash: apply dark class before first paint -->
    <script>
      try {
        var t = localStorage.getItem('theme') || 'dark';
        if (t === 'system') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch(e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
